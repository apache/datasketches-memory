name: Auto JDK & OS Matrix Test & Install

on:
  push:
    paths-ignore: [ '**/*.html', '**/*.md', '**/*.txt', '**/LICENSE', '**/NOTICE' ]
    branches: [ 'main', '[0-9]+.[0-9]+.[Xx]', 'v[0-9]+.[0-9]+.[Xx]']
  pull_request:
    paths-ignore: [ '**/*.html', '**/*.md', '**/*.txt', '**/LICENSE', '**/NOTICE' ]
    branches: [ 'main', '[0-9]+.[0-9]+.[Xx]', 'v[0-9]+.[0-9]+.[Xx]']
  workflow_dispatch: 

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-matrix:
    strategy:
      fail-fast: false
      matrix:
        jdk: [ 25 ]
        include:
          - os: windows-latest
            arch: x64
          - os: ubuntu-latest
            arch: x64
          - os: macos-latest
            arch: aarch64
    
    # Reference the reusable workflow on the "workflows" branch
    uses: apache/datasketches-memory/.github/workflows/reusable-jdk-os-matrix.yml@workflows
    with:
      jdk_version: ${{ matrix.jdk }}
      os_type: ${{ matrix.os }}
      java_arch: ${{ matrix.arch }}

  post-build-cleanup:
    needs: run-matrix
    runs-on: ubuntu-latest
    if: always() # Runs even if the matrix failed (useful for reporting)
    steps:
      - name: Final Status Report
        run: |
          echo "Matrix execution finished with status: ${{ needs.run-matrix.result }}"
          # Add actual cleanup commands here, like deleting temporary cloud resources