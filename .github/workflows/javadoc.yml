name: Deploy Versioned Javadoc (Manual Trigger)

# 1. Select the target TAG where to run the workflow from.
#    This TAG name will become the subdirectory under branch gh-pages/docs/${TAG}
#    where you will copy the javadocs to.
#    The gh-pages/docs branch/folder must exist.

# 2. Run the javadoc.yml workflow manually via Workflow Dispatch on GitHub 
#    and provide the version tag (e.g., 7.0.0).

# 3. Once it finishes, click on the completed run page. 
#    At the bottom under the Artifacts section, will be a downloadable 
#    ZIP file named versioned-javadocs-7.0.0.

# 4. Download that ZIP to your local machine.

# 5. Extract it directly into your local gh-pages repository clone, 
#    verify the HTML formatting locally in your browser, commit the changes, 
#    and execute your git push origin gh-pages right from your terminal.
#
# (Note: this is much safer than having to manage granting write permissions 
# to the runners to access remote production branches)


on:
  workflow_dispatch:
    inputs:
      tag_ref:
        description: 'Existing Git Tag to package (e.g., 7.0.0):'
        required: true
        default: '99.0.0' # unlikely to conflict if accidentally used. Can be left blank

jobs:
  build-and-package-javadoc:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: "Checkout ${{ github.ref }} ( ${{ github.sha }} )"
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag_ref }}  # from manual trigger input
          fetch-depth: 0

      - name: Set up JDK 25 for Host use
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          java-package: jdk
          architecture: x64
          cache: 'maven'

      - name: Pre-compile and Generate Java 11 Javadoc
        run: |
          echo "Generating Javadoc for Java 11 Module..."
          mvn clean compile javadoc:javadoc -pl datasketches-memory-java11

      - name: Pre-compile and Generate Java 17/21 Javadoc
        run: |
          echo "Generating Javadoc for Java 17/21 Module..."
          mvn compile javadoc:javadoc -pl datasketches-memory-java17_21

      - name: Stage Artifacts for Delivery
        run: |
          TAG="${{ github.event.inputs.tag_ref }}"
          STAGE_DIR="javadoc-staging/docs/${TAG}"

          echo "Creating structured staging directories..."
          mkdir -p "${STAGE_DIR}/datasketches-memory-java11-${TAG}"
          mkdir -p "${STAGE_DIR}/datasketches-memory-java17_21-${TAG}"

          echo "Copying generated HTML assets into staging..."
          cp -r datasketches-memory-java11/target/site/apidocs/* \
            "${STAGE_DIR}/datasketches-memory-java11-${TAG}/"

          cp -r datasketches-memory-java17_21/target/site/apidocs/* \
            "${STAGE_DIR}/datasketches-memory-java17_21-${TAG}/"

      - name: Upload Generated Javadocs as Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: versioned-javadocs-${{ github.event.inputs.tag_ref }}
          path: javadoc-staging/
          retention-days: 30
