name: Reusable JDK OS Matrix Logic

on:
  workflow_call:
    inputs:
      jdk_version:
        required: true
        type: string
      os_type:
        required: true
        type: string
      cpu_arch:
        required: true
        type: string
      jdk_distribution:
        required: true
        type: string
      jvm_args:
        required: false
        type: string
        default: ""

env:
  JVM_ARGS: ${{ inputs.jvm_args }}
  MAVEN_OPTS: -Xmx4g -Xms1g
  MAVEN_ARGS: "-B -Dmaven.javadoc.skip=true -Dgpg.skip=true -ntp"
  # -ntp (no-transfer-progress) hides the "Downloaded..." lines

jobs:
  build:
    name: >
      Build (OS ${{ inputs.os_type }}, 
      JDK ${{ inputs.jdk_version }}, 
      CPU ${{ inputs.cpu_arch }}, 
      DIST ${{ inputs.jdk_distribution }}),
      JVM_ARGS ${{ inputs.jvm_args }}
    runs-on: ${{ inputs.os_type }}

    steps:
      # 1. Pull down the compiled workspace binaries from Phase 1
      - name: 1. Download Compiled Workspace Jars
        uses: actions/download-artifact@v4
        with:
          name: compiled-jars

      # 2. Print Workflows (Workspace metadata diagnostics)
      - name: 2. Print Current Workflows
        continue-on-error: true
        run: |
          echo "Checking for workflow files..."
          echo "--- Reusable Workflow (Local Workspace File): ---"
          cat .github/workflows/reusable-jdk-os-matrix.yml \
            || echo "::warning::Could not find Reusable Workflow file."
          echo "--- Caller Workflow (from current branch): ---"
          cat .github/workflows/auto-jdk-os-matrix.yml \
            || echo "::warning::Could not find Caller Workflow file on local branch."

      # 3. Provision ONLY the specific isolated JDK required for this test run
      - name: 3. Provision Target Isolated Execution JDK
        id: target-jdk
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.jdk_version }}
          distribution: ${{ inputs.jdk_distribution }}
          architecture: ${{ inputs.cpu_arch }}
          check-latest: false

      # 4. Environment Verification
      - name: 4. Verify Environment Context
        run: |
          echo "--- Target JVM Path Exposes: ---"
          echo "Path: ${{ steps.target-jdk.outputs.path }}"
          echo "--- Native Maven Boot Info: ---"
          mvn -version

      # 5. Run the mutually exclusive tests targeted strictly to this version
      - name: 5. Run Package Tests from jars via Target JVM Fork
        shell: bash
        run: |
          if [ "${{ inputs.jdk_version }}" = "11" ]; then
            echo "Testing datasketches-memory-java11 jars for JDK version ${{ inputs.jdk_version }}..."
            mvn surefire:test -pl datasketches-memory-java11 \
              -Dmaven.test.classpath.useTestJar=true \
              -Djvm=${{ steps.target-jdk.outputs.path }}/bin/java \
              -DargLine="${{ env.JVM_ARGS }}"
          else
            echo "Testing datasketches-memory-java17_21 jars for JDK version ${{ inputs.jdk_version }}..."
            mvn surefire:test -pl datasketches-memory-java17_21 \
              -Dmaven.test.classpath.useTestJar=true \
              -Djvm=${{ steps.target-jdk.outputs.path }}/bin/java \
              -DargLine="${{ env.JVM_ARGS }}"
          fi

      # 6. Build unified Markdown Job Summary report table
      - name: 6. Add Result to Summary
        if: always()
        shell: bash
        run: |
          # Define the header
          HEADER="| OS | Arch | JDK | DIST | Status |"
          SEP="|----|------|-----|--------|-----|"

          # Check if the header already exists in the summary file
          if ! grep -q "$HEADER" "$GITHUB_STEP_SUMMARY"; then
            echo "$HEADER" >> $GITHUB_STEP_SUMMARY
            echo "$SEP" >> $GITHUB_STEP_SUMMARY
          fi

          # Append the specific job row
          echo "| ${{ inputs.os_type }} | ${{ inputs.cpu_arch }} | ${{ inputs.jdk_version }}| ${{ inputs.jdk_distribution }} | ${{ job.status == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

