name: Reusable JDK OS Matrix Logic

on:
  workflow_call:
    inputs:
      jdk_version:
        required: true
        type: string
      os_type:
        required: true
        type: string
      cpu_arch:
        required: true
        type: string
      jdk_distribution:
        required: true
        type: string
      jvm_args:
        required: false
        type: string
        default: ""

env:
  JVM_ARGS: ${{ inputs.jvm_args }}
  MAVEN_OPTS: -Xmx4g -Xms1g
  MAVEN_ARGS: "-B -Dmaven.javadoc.skip=true -Dgpg.skip=true -ntp"
  # -ntp (no-transfer-progress) hides the "Downloaded..." lines

jobs:
  build:
    name: >
      Build (OS ${{ inputs.os_type }}, 
      JDK ${{ inputs.jdk_version }}, 
      CPU ${{ inputs.cpu_arch }}, 
      DIST ${{ inputs.jdk_distribution }}),
      JVM_ARGS ${{ inputs.jvm_args }}
    runs-on: ${{ inputs.os_type }}
    steps:
      - name: 1. Checkout Source code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: 2. Install Host Driver JDK 25 For Maven
        id: host-driver-jdk # Explicit ID
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          # generate-job-summary: true # gen toolchains file

      - name: 3. Dynamically Provision Target Isolated Execution JDK
        id: target-jdk #Explicit ID
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.jdk_version }}
          distribution: ${{ inputs.jdk_distribution }}
          architecture: ${{ inputs.cpu_arch }}
          check-latest: false #append this JDK version into runner's toolchain

      - name: 4. Explicitly Configure local toolchains.xml
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat <<EOF > ~/.m2/toolchains.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <toolchains>
            <toolchain>
              <type>jdk</type>
              <provides>
                <version>${{ inputs.jdk_version }}</version>
              </provides>
              <configuration>
                <jdkHome>${{ env. Gavin || steps.target-jdk.outputs.path || env.RUNNER_TOOL_CACHE }}/Java_Temurin-Hotspot_jdk/${{ inputs.jdk_version }}*</jdkHome>
              </configuration>
            </toolchain>

            <toolchain>
              <type>jdk</type>
              <provides>
                <version>25</version>
              </provides>
              <configuration>
                <jdkHome>${{ steps.host-driver-jdk.outputs.path || env.JAVA_HOME_25_X64 || env.JAVA_HOME }}</jdkHome>
              </configuration>
            </toolchain>
          </toolchains>
          EOF

      - name: 5. Echo Java & Maven Version
        run: mvn -version

      - name: 6. Clean & Local Install via Host JVM, all artifacts into reactor build path
        run: mvn clean install -DskipTests=true

      - name: 7. Run Package Tests from jars via Target JVM Fork
        shell: bash
        run: |
          if [ "${{ inputs.jdk_version }}" = "11" ]; then
            mvn surefire:test -pl datasketches-memory-java11 \
              -Dmaven.test.classpath.useTestJar=true \
              -Djvm=${{ steps.target-jdk.outputs.path }}/bin/java \
              -DargLine="${{ env.JVM_ARGS }}"
          else
            mvn surefire:test -pl datasketches-memory-java17_21 \
              -Dmaven.test.classpath.useTestJar=true \
              -Djvm=${{ steps.target-jdk.outputs.path }}/bin/java \
              -DargLine="${{ env.JVM_ARGS }}"
          fi

      - name: 8. Print Current Workflows
        continue-on-error: true
        run: |
          echo "Checking for workflow files..."
          echo "--- Reusable Workflow (from worflows branch): ---"
          git show origin/workflows:.github/workflows/reusable-jdk-os-matrix.yml \
            || echo "::warning::Could not find Reusable Workflow on workflows branch."
          echo "--- Caller Workflow (from current branch): ---"
          cat .github/workflows/auto-jdk-os-matrix.yml \
            || echo "::warning::Could not find Caller Workflow file on local branch."
          echo "--- JVM ARGS ---"
          echo "${{ env.JVM_ARGS }}"

      - name: 9. Add Result to Summary
        if: always()
        shell: bash
        run: |
          # Define the header
          HEADER="| OS | Arch | JDK | DIST | Status |"
          SEP="|----|------|-----|--------|-----|"

          # Check if the header already exists in the summary file
          if ! grep -q "$HEADER" "$GITHUB_STEP_SUMMARY"; then
            echo "$HEADER" >> $GITHUB_STEP_SUMMARY
            echo "$SEP" >> $GITHUB_STEP_SUMMARY
          fi

          # Append the specific job row
          echo "| ${{ inputs.os_type }} \
                | ${{ inputs.cpu_arch }} \
                | ${{ inputs.jdk_version }} \
                | ${{ inputs.jdk_distribution }} \
                | ${{ job.status == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
