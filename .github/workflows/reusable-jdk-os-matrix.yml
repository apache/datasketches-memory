name: Reusable JDK OS Matrix Logic

on:
  workflow_call:
    inputs:
      jdk_version:
        required: true
        type: string
      os_type:
        required: true
        type: string
      cpu_arch:
        required: true
        type: string
      jdk_distribution:
        required: true
        type: string
      jvm_args:
        required: false
        type: string
        default: ""

env:
  JVM_ARGS: ${{ inputs.jvm_args }}
  MAVEN_OPTS: -Xmx4g -Xms1g
  MAVEN_ARGS: "-B -Dmaven.javadoc.skip=true -Dgpg.skip=true -ntp"
  # -ntp (no-transfer-progress) hides the "Downloaded..." lines

jobs:
  build:
    name: >
      Build (OS ${{ inputs.os_type }}, 
      JDK ${{ inputs.jdk_version }}, 
      CPU ${{ inputs.cpu_arch }}, 
      DIST ${{ inputs.jdk_distribution }}),
      JVM_ARGS ${{ inputs.jvm_args }}
    runs-on: ${{ inputs.os_type }}
    steps:
      - name: Checkout Source code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Checkout Workflow Logic (workflows branch)
        uses: actions/checkout@v6
        with:
          ref: workflows
          path: .github/workflow-logic

      - name: Install Matrix JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.jdk_version }}
          architecture: ${{ inputs.cpu_arch }}
          distribution: ${{ inputs.jdk_distribution }}
          java-package: jdk
          cache: 'maven'
          overwrite-settings: true

      - name: Verify Toolchain Configuration
        shell: bash
        run: |
          if [ -f ~/.m2/toolchains.xml ]; then
            cat ~/.m2/toolchains.xml
          else
            echo "toolchains.xml not found in ~/.m2/"
          fi

      - name: Echo Java & Maven Version
        run: mvn -version

      - name: Print Current Workflows
        continue-on-error: true
        run: |
          echo "Checking for workflow files..."
          echo "--- Reusable Workflow: ---"
          cat .github/workflow-logic/.github/workflows/reusable-jdk-os-matrix.yml || echo "::warning::Could not find Reusable Workflow file."
          echo "--- Caller Workflow: ---"
          cat .github/workflows/auto-jdk-os-matrix.yml || echo "::warning::Could not find Caller Workflow file."
          echo "--- JVM ARGS ---"
          echo "${{ env.JVM_ARGS }}"

      - name: Test
        run: mvn clean test -DargLine="${{ env.JVM_ARGS }}"

      - name: Install
        run: mvn clean install "-DskipTests=true" "-Dmaven.clean.failOnError=false" "-DargLine=${{ env.JVM_ARGS }}"

      - name: Add Result to Summary
        if: always()
        shell: bash
        run: |
          # Define the header
          HEADER="| OS | Arch | JDK | DIST | Status |"
          SEP="|----|------|-----|--------|-----|"

          # Check if the header already exists in the summary file
          if ! grep -q "$HEADER" "$GITHUB_STEP_SUMMARY"; then
            echo "$HEADER" >> $GITHUB_STEP_SUMMARY
            echo "$SEP" >> $GITHUB_STEP_SUMMARY
          fi

          # Append the specific job row
          echo "| ${{ inputs.os_type }} | ${{ inputs.cpu_arch }} | ${{ inputs.jdk_version }} | ${{ inputs.jdk_distribution }} | ${{ job.status == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

