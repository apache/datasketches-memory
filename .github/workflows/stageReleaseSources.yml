name: Stage Release Sources (Manual Trigger)

# This workflow acts as Phase 1 of your official Release Candidate process.
# It handles the clean compilation, license verification, and source packaging
# on a cloud runner, delivering a pristine ZIP for local signing.

on:
  workflow_dispatch:

jobs:
  assemble-source-candidate:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      # 1. Checkout the clean working workspace context
      - name: 1. Checkout Branch Context
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      # 2. Set up the foundational Java runtime environment
      - name: 2. Provision JDK 25 for Build Execution
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          java-package: jdk
          architecture: x64
          cache: 'maven'

      # 3. Dynamically extract the project version from the root pom.xml
      - name: 3. Extract POM Project Version
        id: parse-version
        shell: bash
        run: |
          POM_VERSION=$(mvn help:evaluate -B -Dexpression=project.version -q -DforceStdout)
          echo "Target Release Version: $POM_VERSION"
          echo "POM_VERSION=$POM_VERSION" >> $GITHUB_ENV

      # 4. Audit license headers across all source files and submodules
      - name: 4. Execute Apache RAT License Audit
        shell: bash
        run: |
          echo "Running corporate license header checks..."
          mvn apache-rat:check -N -B

      # Diagnostic Step: Print the target report if the audit drops dead
      - name: 4b. Diagnostic - Display RAT Failure Report
        if: always()
        shell: bash
        run: |
          echo "Checking for java11 submodule RAT report..."
          if [ -f datasketches-memory-java11/target/rat.txt ]; then
            echo "=== DATASKETCHES-MEMORY-JAVA11 RAT.TXT ==="
            cat datasketches-memory-java11/target/rat.txt
          else
            echo "No submodule rat.txt report found."
          fi

      # 5. Clean workspace and assemble the official source release container
      - name: 5. Build Apache Source Release Archive
        shell: bash
        run: |
          echo "Assembling project distribution ZIP..."
          mvn clean assembly:single -N -B

      # 6. Relocate and calculate the SHA-512 cryptographic checksum string
      - name: 6. Stage Deliverables and Compute Checksums
        shell: bash
        run: |
          # Create a temporary staging area for the artifact collection
          mkdir -p staging_dir
          
          # Define standard names based on the extracted POM version
          SRC_ZIP="datasketches-memory-${{ env.POM_VERSION }}-src.zip"
          
          echo "Locating generated assembly asset..."
          cp target/datasketches-memory-${{ env.POM_VERSION }}-source-release.zip staging_dir/$SRC_ZIP
          
          cd staging_dir
          echo "Generating SHA-512 checksum signature file..."
          sha512sum $SRC_ZIP > $SRC_ZIP.sha512
          
          echo "Verification Checksum Content:"
          cat $SRC_ZIP.sha512

      # 7. Package and upload the staged bundle as a secure workflow archive
      - name: 7. Upload Release Candidate Assets for Local Signing
        uses: actions/upload-artifact@v7
        with:
          name: datasketches-memory-release-source-bundle
          path: staging_dir/
          retention-days: 15

  test-source-candidate:
    name: Test Source Candidate on ${{ matrix.os }}
    needs: assemble-source-candidate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      # 1. Download the zipped artifact uploaded by the previous job
      - name: Download Source ZIP Artifact
        uses: actions/download-artifact@v4
        with:
          name: datasketches-memory-release-source-bundle
          path: downloaded-bundle

      # 2. Extract the source distribution
      - name: Extract Source Distribution
        shell: bash
        run: |
          # The downloaded artifact folder contains the zip file
          ZIP_FILE=$(ls downloaded-bundle/*.zip)
          echo "Unzipping $ZIP_FILE..."
          unzip -q $ZIP_FILE -d test-workspace
          
      # 3. Setup Java Toolchain (11, 17, and 21)
      - name: Setup Java Toolchains
        uses: actions/setup-java@v5
        with:
          java-version: |
            11
            17
            21
          distribution: 'temurin'
          
      # 4. Run the tests on the unzipped sources
      - name: Execute Tests
        shell: bash
        run: |
          # Enter the unzipped directory (which will be named datasketches-memory-X.Y.Z-src)
          cd test-workspace/*
          echo "Running tests in $(pwd)"
          
          # Run the standard test phase (this validates line-endings, missing files, and fallbacks!)
          mvn clean test
